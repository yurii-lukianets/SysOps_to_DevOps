- name: Create portainer directory
  file:
    path: "{{ services.portainer.dir }}"
    state: directory
    mode: '0755'

- name: Copy portainer docker-compose
  copy:
    src: "{{ playbook_dir }}/../docker/portainer/docker-compose.yml"
    dest: "{{ services.portainer.dir }}/docker-compose.yml"
    mode: '0644'

- name: Start portainer stack
  community.docker.docker_compose_v2:
    project_src: "{{ services.portainer.dir }}"
    state: present
    pull: missing

- name: Verify portainer is running
  command: docker ps --filter name=portainer --format "{{ '{{' }}.Status{{ '}}' }}"
  register: portainer_status
  changed_when: false

- name: Show portainer status
  debug:
    msg: "Portainer: {{ portainer_status.stdout }}"