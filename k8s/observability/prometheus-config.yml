apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
      evaluation_interval: 60s
      scrape_timeout: 10s
    scrape_configs:
      - job_name: 'node'
        static_configs:
          - targets: ['node-exporter.observability.svc:9100']
