apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /health {
            default_type application/json;
            return 200 '{"status":"ok","service":"portfolio"}';
        }

        location /stub_status {
            stub_status;
        }
    }
