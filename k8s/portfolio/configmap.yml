apiVersion: v1
kind: ConfigMap
metadata:
  name: portfolio-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Yurii Lukianets — DevOps Engineer</title>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
      <style>
        :root {
          --bg: #0b0e14;
          --surface: #11161e;
          --surface2: #161c28;
          --border: #1e2738;
          --accent: #4a9eff;
          --accent-dim: #2d6fc4;
          --text: #e8edf5;
          --muted: #5a6a85;
          --muted2: #8a9bb8;
          --mono: 'JetBrains Mono', monospace;
          --sans: 'Inter', system-ui, sans-serif;
          --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          font-weight: 400;
          min-height: 100vh;
          line-height: 1.7;
          -webkit-font-smoothing: antialiased;
        }

        .wrap { max-width: 960px; margin: 0 auto; padding: 0 2rem; }

        /* Top bar */
        .topbar {
          border-bottom: 1px solid var(--border);
          padding: 0.85rem 0;
          position: sticky;
          top: 0;
          background: rgba(11,14,20,0.85);
          backdrop-filter: blur(12px);
          z-index: 10;
        }
        .topbar-inner {
          display: flex;
          justify-content: space-between;
          align-items: center;
          font-family: var(--mono);
          font-size: 0.7rem;
          color: var(--muted);
          letter-spacing: 0.06em;
        }
        .topbar-right { display: flex; align-items: center; gap: 1.5rem; }
        .live-dot {
          display: flex; align-items: center; gap: 0.45rem;
          color: #4ade80;
        }
        .live-dot::before {
          content: '';
          width: 6px; height: 6px;
          background: #4ade80;
          border-radius: 50%;
          box-shadow: 0 0 6px rgba(74,222,128,0.5);
          animation: blink 2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

        /* Header */
        header {
          padding: 5.5rem 0 3.5rem;
        }

        .name {
          font-family: var(--sans);
          font-size: clamp(2.6rem, 5.5vw, 4.2rem);
          font-weight: 600;
          letter-spacing: -0.03em;
          line-height: 1.05;
          margin-bottom: 0.75rem;
          background: linear-gradient(135deg, #e8edf5 0%, #8a9bb8 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }

        .role {
          font-family: var(--mono);
          font-size: 0.75rem;
          color: var(--muted);
          letter-spacing: 0.1em;
          margin-bottom: 2.5rem;
        }
        .role span { color: var(--accent); }

        .header-meta {
          display: flex;
          gap: 2.5rem;
          flex-wrap: wrap;
          padding: 1.5rem 0 0;
          border-top: 1px solid var(--border);
        }
        .meta-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .meta-label {
          font-family: var(--mono); font-size: 0.6rem;
          color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
        }
        .meta-val { font-family: var(--mono); font-size: 0.78rem; color: var(--text); }
        .meta-val a {
          color: var(--muted2); text-decoration: none;
          transition: color 0.15s;
        }
        .meta-val a:hover { color: var(--accent); }

        /* Sections */
        section { padding: 3rem 0; }
        section + section { border-top: 1px solid var(--border); }

        .section-head {
          display: flex;
          align-items: center;
          gap: 1.2rem;
          margin-bottom: 2rem;
        }
        .section-num {
          font-family: var(--mono);
          font-size: 0.6rem;
          color: var(--accent);
          letter-spacing: 0.06em;
          padding: 0.15rem 0.5rem;
          border: 1px solid var(--accent-dim);
          opacity: 0.7;
        }
        .section-title {
          font-size: 0.7rem;
          font-family: var(--mono);
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--muted2);
        }

        /* Stack table */
        .stack-table { width: 100%; border-collapse: collapse; }
        .stack-table tr { border-bottom: 1px solid var(--border); }
        .stack-table tr:last-child { border-bottom: none; }
        .stack-table td {
          padding: 1rem 0.75rem 1rem 0;
          font-size: 0.82rem;
          color: var(--muted2);
          vertical-align: top;
        }
        .stack-table td:first-child {
          font-family: var(--mono);
          font-size: 0.7rem;
          color: var(--muted);
          width: 160px;
          letter-spacing: 0.04em;
        }
        .stack-table td:nth-child(2) {
          color: var(--text);
          font-weight: 400;
          width: 200px;
        }

        .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .tag {
          font-family: var(--mono);
          font-size: 0.6rem;
          padding: 0.15rem 0.5rem;
          border: 1px solid var(--border);
          color: var(--muted2);
          letter-spacing: 0.04em;
        }
        .tag.hi { border-color: var(--accent-dim); color: var(--accent); }
        .tag.ok { border-color: #1e2738; color: var(--muted2); opacity: 0.85; }

        /* Metrics */
        .metrics-grid {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 1px;
          background: var(--border);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          overflow: hidden;
        }
        .metric {
          background: var(--surface);
          padding: 1.4rem 1.2rem;
          display: flex;
          flex-direction: column;
          gap: 0.4rem;
        }
        .metric-val {
          font-family: var(--mono);
          font-size: 1.5rem;
          font-weight: 500;
          color: var(--accent);
          line-height: 1.1;
        }
        .metric-label {
          font-family: var(--mono);
          font-size: 0.6rem;
          color: var(--muted);
          letter-spacing: 0.06em;
          text-transform: uppercase;
          line-height: 1.3;
        }

        /* Timeline */
        .steps { display: flex; flex-direction: column; }
        .step {
          display: grid;
          grid-template-columns: 56px 1fr;
        }
        .step + .step { border-top: 1px solid var(--border); }
        .step-num {
          font-family: var(--mono);
          font-size: 0.65rem;
          color: var(--muted);
          padding: 1.1rem 0;
          letter-spacing: 0.04em;
        }
        .step-body {
          padding: 1.1rem 0 1.1rem 1.5rem;
          border-left: 1px solid var(--border);
        }
        .step-title {
          font-size: 0.88rem;
          font-weight: 500;
          margin-bottom: 0.3rem;
          display: flex;
          align-items: center;
          gap: 0.7rem;
          flex-wrap: wrap;
        }
        .badge {
          font-family: var(--mono);
          font-size: 0.55rem;
          padding: 0.1rem 0.45rem;
          letter-spacing: 0.07em;
          text-transform: uppercase;
        }
        .badge.live { color: var(--accent); border: 1px solid var(--accent-dim); }
        .badge.done { color: var(--muted); border: 1px solid var(--border); }
        .badge.active { color: #4ade80; border: 1px solid #4ade80; }
        .step-desc { font-size: 0.78rem; color: var(--muted2); line-height: 1.65; }

        /* Project card */
        .project-card {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: var(--radius);
          padding: 2rem;
          display: grid;
          grid-template-columns: 1fr auto;
          gap: 2rem;
          align-items: start;
          transition: border-color 0.2s;
        }
        .project-card:hover { border-color: var(--accent-dim); }
        .project-title {
          font-size: 1rem;
          font-weight: 600;
          margin-bottom: 0.5rem;
          background: linear-gradient(135deg, var(--accent), #7c8dff);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
          background-clip: text;
        }
        .project-desc {
          font-size: 0.8rem;
          color: var(--muted2);
          line-height: 1.65;
          margin-bottom: 1rem;
        }
        .project-link {
          font-family: var(--mono);
          font-size: 0.68rem;
          color: var(--muted2);
          text-decoration: none;
          border: 1px solid var(--border);
          padding: 0.55rem 1.1rem;
          white-space: nowrap;
          letter-spacing: 0.04em;
          transition: all 0.2s;
          border-radius: var(--radius);
        }
        .project-link:hover {
          border-color: var(--accent);
          color: var(--accent);
          background: rgba(74,158,255,0.06);
        }

        /* Footer */
        footer {
          padding: 2rem 0 3rem;
          display: flex;
          justify-content: space-between;
          flex-wrap: wrap;
          gap: 0.5rem;
          font-family: var(--mono);
          font-size: 0.6rem;
          color: var(--muted);
          letter-spacing: 0.06em;
          border-top: 1px solid var(--border);
          margin-top: 1rem;
        }

        @media (max-width: 720px) {
          .metrics-grid { grid-template-columns: repeat(2, 1fr); }
          .stack-table td:last-child { display: none; }
          .project-card { grid-template-columns: 1fr; }
          .step-body { padding-left: 1rem; }
        }
        @media (max-width: 480px) {
          .metrics-grid { grid-template-columns: 1fr 1fr; }
          .header-meta { gap: 1.2rem; }
          .topbar-right span:last-child { display: none; }
        }

        /* Subtle background grid */
        body::before {
          content: '';
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background-image:
            linear-gradient(rgba(30,39,56,0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(30,39,56,0.3) 1px, transparent 1px);
          background-size: 48px 48px;
          pointer-events: none;
          z-index: -1;
        }
      </style>
    </head>
    <body>

    <div class="topbar">
      <div class="wrap">
        <div class="topbar-inner">
          <span>yurii-lukianets / portfolio</span>
          <div class="topbar-right">
            <span class="live-dot" id="status-dot">all systems operational</span>
            <span>ai-devops.pp.ua</span>
          </div>
        </div>
      </div>
    </div>
    <script>
    fetch('/health').then(r=>{if(!r.ok)throw Error()}).catch(()=>{
      document.getElementById('status-dot').style.color='#f87171';
      document.getElementById('status-dot').textContent='degraded';
    });
    </script>

    <div class="wrap">

      <header>
        <div class="name">Yurii Lukianets</div>
        <div class="role">SYSOPS <span>→</span> DEVOPS ENGINEER <span>·</span> LOCAL LLM INFRASTRUCTURE</div>
        <div class="header-meta">
          <div class="meta-item">
            <span class="meta-label">Role</span>
            <span class="meta-val">DevOps / Infrastructure Engineer</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Focus</span>
            <span class="meta-val">Kubernetes · GitOps · LLM Inference</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">GitHub</span>
            <span class="meta-val"><a href="https://github.com/yurii-lukianets/SysOps_to_DevOps">SysOps_to_DevOps →</a></span>
          </div>
          <div class="meta-item">
            <span class="meta-label">LLM API</span>
            <span class="meta-val"><a href="https://llm.ai-devops.pp.ua/health">llm.ai-devops.pp.ua →</a></span>
          </div>
        </div>
      </header>

      <!-- Stack -->
      <section>
        <div class="section-head">
          <span class="section-num">01</span>
          <span class="section-title">Infrastructure Stack</span>
        </div>
        <table class="stack-table">
          <tr>
            <td>orchestration</td>
            <td>K3s v1.35 · Kubernetes</td>
            <td><div class="tags"><span class="tag hi">K3s</span><span class="tag ok">Traefik</span><span class="tag ok">Helm</span><span class="tag ok">CoreDNS</span></div></td>
          </tr>
          <tr>
            <td>gitops / cd</td>
            <td>ArgoCD v3.4.2</td>
            <td><div class="tags"><span class="tag hi">ArgoCD</span><span class="tag ok">GitHub Actions</span><span class="tag ok">GHCR</span></div></td>
          </tr>
          <tr>
            <td>iac</td>
            <td>Terraform + Ansible</td>
            <td><div class="tags"><span class="tag hi">Terraform</span><span class="tag ok">Ansible</span><span class="tag ok">MinIO S3</span></div></td>
          </tr>
          <tr>
            <td>observability</td>
            <td>Prometheus + Grafana</td>
            <td><div class="tags"><span class="tag hi">Prometheus</span><span class="tag ok">Grafana</span><span class="tag ok">node-exporter</span></div></td>
          </tr>
          <tr>
            <td>local llm</td>
            <td>Qwen3-35B · llama.cpp</td>
            <td><div class="tags"><span class="tag hi">CUDA</span><span class="tag ok">RTX 3050</span><span class="tag ok">MXFP4 MoE</span><span class="tag ok">OpenAI API</span></div></td>
          </tr>
          <tr>
            <td>security</td>
            <td>Cloudflare + CrowdSec</td>
            <td><div class="tags"><span class="tag hi">WAF</span><span class="tag ok">iptables</span><span class="tag ok">CrowdSec</span><span class="tag ok">GeoIP</span></div></td>
          </tr>
          <tr>
            <td>tls</td>
            <td>cert-manager · Let's Encrypt</td>
            <td><div class="tags"><span class="tag ok">TLS 1.3</span><span class="tag ok">auto-renewal</span></div></td>
          </tr>
        </table>
      </section>

      <!-- Metrics -->
      <section>
        <div class="section-head">
          <span class="section-num">02</span>
          <span class="section-title">LLM Performance · RTX 3050 · Qwen3-35B-A3B MXFP4</span>
        </div>
        <div class="metrics-grid">
          <div class="metric">
            <span class="metric-val">34</span>
            <span class="metric-label">tok/s generation</span>
          </div>
          <div class="metric">
            <span class="metric-val">411</span>
            <span class="metric-label">tok/s prefill</span>
          </div>
          <div class="metric">
            <span class="metric-val">2.9s</span>
            <span class="metric-label">avg latency</span>
          </div>
          <div class="metric">
            <span class="metric-val">94%</span>
            <span class="metric-label">VRAM usage</span>
          </div>
          <div class="metric">
            <span class="metric-val">32K</span>
            <span class="metric-label">context tokens</span>
          </div>
          <div class="metric">
            <span class="metric-val">6/6</span>
            <span class="metric-label">API tests pass</span>
          </div>
          <div class="metric">
            <span class="metric-val">8760h</span>
            <span class="metric-label">uptime (cluster)</span>
          </div>
          <div class="metric">
            <span class="metric-val">99.9%</span>
            <span class="metric-label">TLS uptime</span>
          </div>
        </div>
      </section>

      <!-- Steps -->
      <section>
        <div class="section-head">
          <span class="section-num">03</span>
          <span class="section-title">Progress · 14 Steps</span>
        </div>
        <div class="steps">
          <div class="step">
            <span class="step-num">01–04</span>
            <div class="step-body">
              <div class="step-title">Foundation <span class="badge done">done</span></div>
              <div class="step-desc">Windows workstation · GitHub · Docker + Portainer · Prometheus + Grafana + node-exporter</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">05–07</span>
            <div class="step-body">
              <div class="step-title">Automation &amp; IaC <span class="badge done">done</span></div>
              <div class="step-desc">GitHub Actions self-hosted runner · Ansible roles · Terraform with MinIO S3 remote state</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">08–09</span>
            <div class="step-body">
              <div class="step-title">Kubernetes + GitOps <span class="badge done">done</span></div>
              <div class="step-desc">K3s v1.35 · ArgoCD auto-sync + self-heal · git push → auto scale 1→2 replicas tested</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">10</span>
            <div class="step-body">
              <div class="step-title">Portfolio Site <span class="badge live">live</span></div>
              <div class="step-desc">ai-devops.pp.ua · Traefik ingress · cert-manager + Let's Encrypt TLS 1.3 · ArgoCD GitOps</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">11</span>
            <div class="step-body">
              <div class="step-title">Self-hosted LLM API <span class="badge live">live</span></div>
              <div class="step-desc">FastAPI proxy → Qwen3-35B · GitHub Actions → GHCR → ArgoCD → K3s · OpenAI-compatible · 6/6 tests</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">12</span>
            <div class="step-body">
              <div class="step-title">Full Observability <span class="badge live">live</span></div>
              <div class="step-desc">Custom Prometheus metrics in FastAPI · llama.cpp /metrics · Grafana LLM dashboard · Benchmark results</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">13</span>
            <div class="step-body">
              <div class="step-title">Production Security <span class="badge active">active</span></div>
              <div class="step-desc">Cloudflare WAF · iptables (CF IPs only) · CrowdSec 780 scenarios · GoAccess GeoIP · Auto-ban live</div>
            </div>
          </div>
          <div class="step">
            <span class="step-num">14</span>
            <div class="step-body">
              <div class="step-title">AWS K3s Deployment <span class="badge live">live</span></div>
              <div class="step-desc">EC2 t3.micro · Terraform + EIP · cert-manager TLS · SG locked to Cloudflare · S3 state · Prometheus + node-exporter</div>
            </div>
          </div>
        </div>
      </section>

      <!-- Project -->
      <section>
        <div class="section-head">
          <span class="section-num">04</span>
          <span class="section-title">Project</span>
        </div>
        <div class="project-card">
          <div>
            <div class="project-title">SysOps to DevOps</div>
            <div class="project-desc">
              Full DevOps learning path built from scratch — from Windows workstation to production
              Kubernetes with self-hosted LLM inference, GitOps pipeline, observability, and security.
            </div>
            <div class="tags">
              <span class="tag ok">K3s</span><span class="tag ok">ArgoCD</span>
              <span class="tag ok">Terraform</span><span class="tag ok">Ansible</span>
              <span class="tag ok">Prometheus</span><span class="tag ok">Grafana</span>
              <span class="tag ok">llama.cpp</span><span class="tag ok">FastAPI</span>
              <span class="tag ok">Cloudflare</span><span class="tag ok">CrowdSec</span>
            </div>
          </div>
          <a class="project-link" href="https://github.com/yurii-lukianets/SysOps_to_DevOps">
            View on GitHub →
          </a>
        </div>
      </section>

      <footer>
        <span>Deployed on AWS K3s + Local K3s · HTTPS by Let's Encrypt</span>
        <span>Cloudflare WAF · TLS 1.3 · Prometheus</span>
      </footer>

    </div>
    </body>
    </html>
