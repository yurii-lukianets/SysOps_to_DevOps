apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-api
  template:
    metadata:
      labels:
        app: llm-api
    spec:
      containers:
      - name: llm-api
        image: ghcr.io/yurii-lukianets/llm-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: LLAMA_SERVER_URL
          value: "http://192.168.100.15:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
