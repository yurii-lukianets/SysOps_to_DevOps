global:
  scrape_interval: 15s
  evaluation_interval: 15s
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
  - job_name: llama-server
    static_configs:
      - targets: ['192.168.100.15:8080']
    metrics_path: /metrics
  - job_name: llm-api
    static_configs:
      - targets: ['192.168.100.203:30800']
    metrics_path: /metrics
    params:
      format: ['prometheus']
  - job_name: aws-node-exporter
    scrape_interval: 60s
    scrape_timeout: 10s
    static_configs:
      - targets: ['192.168.100.203:9101']
    metrics_path: /metrics
