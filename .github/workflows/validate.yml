name: Validate configs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-docker-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Validate portainer compose
        run: docker compose -f docker/portainer/docker-compose.yml config

      - name: Validate monitoring compose
        run: docker compose -f docker/monitoring/docker-compose.yml config

      - name: Validate prometheus config
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro \
            --entrypoint /bin/promtool \
            prom/prometheus:latest \
            check config /etc/prometheus/prometheus.yml