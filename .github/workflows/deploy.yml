name: Deploy to server

on:
  push:
    branches: [ main ]
    paths:
      - 'docker/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy monitoring configs
        run: |
          cp $GITHUB_WORKSPACE/docker/monitoring/docker-compose.yml /home/tst/devops-lab/monitoring/
          cp $GITHUB_WORKSPACE/docker/monitoring/prometheus.yml /home/tst/devops-lab/monitoring/

      - name: Copy portainer config
        run: |
          cp $GITHUB_WORKSPACE/docker/portainer/docker-compose.yml /home/tst/devops-lab/portainer/

      - name: Restart monitoring stack
        run: cd /home/tst/devops-lab/monitoring && docker compose up -d

      - name: Verify deployment
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"